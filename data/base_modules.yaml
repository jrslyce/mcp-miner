      - material_id: mat_element_cu
        base_quantity: 4
  - id: base_weird_matter_annex
    display_name: Weird Matter Annex
    max_level: 3
    unlock:
      space_bucks: 9000
      required_modules:
        - base_fabrication_bay
        - base_refinery
    effects:
      - target: weird_matter_quality_cap
        formula: "L"
    material_costs:
      - material_id: mat_fictional_sparkglass
        base_quantity: 10
      - material_id: mat_element_pt
        base_quantity: 3
      - material_id: mat_gem_amethyst
